name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Setiap hari otomatis update
  workflow_dispatch:       # Bisa dijalankan manual

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: IvanRoberto83
          outputs: |
            dist/github-snake.svg?color_snake=ff6b00&color_dots=3d1f00,7a3d00,cc5500,ff6b00
            dist/github-snake-dark.svg?color_snake=ff6b00&color_dots=3d1f00,7a3d00,cc5500,ff6b00
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
