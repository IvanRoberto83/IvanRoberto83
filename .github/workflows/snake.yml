name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: IvanRoberto83
          outputs: |
            dist/github-snake.svg?color_snake=ff6b00&color_dots=21262d,7a3d00,cc5500,ff6b00&color_empty=21262d
            dist/github-snake-dark.svg?color_snake=ff6b00&color_dots=161b22,7a3d00,cc5500,ff6b00&color_empty=161b22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist/
