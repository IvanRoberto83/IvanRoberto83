name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: antonibe/snake-svg-output@v1
        with:
          github_user_name: IvanRoberto83
          snake_color: ff6b00
          background_color: 0d1117
          dot_color_empty: 3d1f00
          dot_color_1: 7a3d00
          dot_color_2: cc5500
          dot_color_3: ff6b00
          dot_color_4: ffd400
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist/
