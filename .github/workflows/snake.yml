name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  
  workflow_dispatch: 

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: IvanRoberto83
          outputs: |
            dist/github-snake.svg?color_snake=FFD400&color_dots=E6501B,FF5F00,FF8C00,FFC300
            dist/github-snake-dark.svg?color_snake=FFD400&color_dots=E6501B,FF5F00,FF8C00,FFC300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
