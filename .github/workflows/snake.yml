name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: IvanRoberto83
          outputs: |
            dist/github-snake.svg?color_snake=%232d2d2d&color_dots=%23bfc9d1,%23ffdbb5,%23ffbe7d,%23ff964a,%23ff6b00
            dist/github-snake-dark.svg?color_snake=%23bfc9d1&color_dots=%231a0a00,%233d1f00,%237a3d00,%23cc5500,%23ff6b00
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist/
